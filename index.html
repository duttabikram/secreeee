<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#fdf2f5,#fef3ed,#fdf0f3);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;color:#4a2030;padding:16px}
h1,h2,h3{font-family:'Playfair Display',serif}
#app{position:relative;z-index:10;width:100%;max-width:440px}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:20px;padding:36px 28px;box-shadow:0 8px 32px rgba(180,100,130,0.12);border:1px solid #f3d5de;text-align:center;animation:fadeUp .5s ease-out;margin-bottom:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.emoji{font-size:2.5rem;margin-bottom:14px;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.12);opacity:1}}
.message{font-size:1.1rem;line-height:1.7;font-weight:500;min-height:100px;margin-bottom:8px}
.cursor{display:inline-block;width:2px;height:18px;background:#d4748a;margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.choices{margin-top:24px;display:flex;flex-direction:column;gap:12px;opacity:0;animation:fadeIn .4s ease-out forwards;animation-delay:.2s}
@keyframes fadeIn{to{opacity:1}}
.btn{background:#d4748a;color:#fff;border:none;border-radius:14px;padding:14px 20px;font-size:1rem;font-weight:600;font-family:'Quicksand',sans-serif;cursor:pointer;transition:all .2s}
.btn:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(212,116,138,0.35)}
.btn:active{transform:scale(.97)}
.progress-bar{height:4px;background:#f3d5de;border-radius:4px;margin-bottom:22px;overflow:hidden}
.progress-fill{height:100%;background:#d4748a;border-radius:4px;transition:width .5s ease}
.final-note{margin-top:20px;font-style:italic;color:#a07080;font-size:.9rem}
.heart{position:fixed;bottom:-20px;pointer-events:none;z-index:0;font-size:1.2rem;animation:floatUp linear forwards}
@keyframes floatUp{0%{transform:translateY(0) scale(1) rotate(0);opacity:1}100%{transform:translateY(-110vh) scale(.3) rotate(45deg);opacity:0}}

/* Music button */
.music-btn{position:fixed;top:16px;right:16px;z-index:50;width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border:1px solid #f3d5de;box-shadow:0 4px 16px rgba(180,100,130,0.15);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:transform .2s}
.music-btn:hover{transform:scale(1.1)}
.music-btn:active{transform:scale(.95)}

/* Hold game */
.game-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:20px;padding:32px 28px;box-shadow:0 8px 32px rgba(180,100,130,0.12);border:1px solid #f3d5de;text-align:center;animation:fadeUp .5s ease-out;margin-bottom:20px}
.game-title{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:600;margin-bottom:4px}
.game-sub{color:#a07080;font-size:.85rem;margin-bottom:20px}
.ring-wrap{position:relative;width:112px;height:112px;margin:0 auto 16px}
.ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#f3d5de;stroke-width:6}
.ring-fill{fill:none;stroke:#d4748a;stroke-width:6;stroke-linecap:round;stroke-dasharray:283;transition:none}
.hold-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;border-radius:50%;background:#d4748a;color:#fff;font-weight:700;font-size:.85rem;border:none;cursor:pointer;font-family:'Quicksand',sans-serif;transition:transform .1s;user-select:none;-webkit-user-select:none}
.hold-btn:active{transform:translate(-50%,-50%) scale(.95)}
.reveal{margin-top:8px;animation:fadeIn .5s ease-out forwards;opacity:0}
.reveal p{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;line-height:1.6;color:#4a2030}
.reveal button{margin-top:12px;background:none;border:none;color:#a07080;text-decoration:underline;cursor:pointer;font-family:'Quicksand',sans-serif;font-size:.85rem}
.reveal button:hover{color:#4a2030}
</style>
</head>
<body>

<button class="music-btn" id="musicBtn" title="Play / Mute music">🔇</button>
  <audio id="bgMusic" loop>
  <source src="violin.mp3" type="audio/mpeg">
</audio>
<div id="app"></div>

<script>
// ---- STEPS ----
const steps={start:{emoji:"🌸",message:"Hey… I heard about the accident. Before anything else — how are you feeling right now?",choices:[{label:"Still hurting a bit 😔",next:"hurting"},{label:"I'm okay, getting better 😊",next:"okay"}]},hurting:{emoji:"🤕",message:"I'm so sorry you're still in pain. That hit from behind on the scooty… you and your sister didn't deserve any of that. I wish I could take some of that pain away.",choices:[{label:"It was really scary",next:"scary"},{label:"I'll be fine, don't worry",next:"dontworry"}]},okay:{emoji:"💛",message:"I'm glad to hear that. But I know you — you always say you're fine even when you're not. That fall from the scooty wasn't small. Please don't push yourself too hard.",choices:[{label:"You know me too well 😅",next:"knowme"},{label:"I'm really okay, promise",next:"dontworry"}]},scary:{emoji:"😟",message:"I can only imagine. Someone hitting you from behind like that, both of you falling… When I heard about it, my heart just stopped for a moment. I couldn't think straight.",choices:[{label:"You were that worried?",next:"worried"},{label:"It's over now, I'm safe",next:"safe"}]},dontworry:{emoji:"🌿",message:"See, that's the thing — I can't NOT worry. When I found out about the accident, about you falling off the scooty… something inside me just froze. I didn't know what to do with myself.",choices:[{label:"That means a lot to me 🥺",next:"meansalot"},{label:"Why do you care so much?",next:"worried"}]},knowme:{emoji:"😊",message:"Maybe I do. Maybe I pay more attention than you realize. And when you got hurt… it hit me differently. Like something I was trying to ignore suddenly became very real.",choices:[{label:"What do you mean?",next:"realization"},{label:"I pay attention to you too",next:"meansalot"}]},worried:{emoji:"💭",message:"Because somewhere along the way, you stopped being just someone I know. You became someone I think about. Someone whose pain I feel. And this accident made me realize I can't keep pretending otherwise.",game:true,choices:[{label:"What are you saying? 🥹",next:"realization"},{label:"I think I feel the same",next:"confession"}]},safe:{emoji:"🕊️",message:"You are safe. And I'm so grateful for that. But in that moment when I didn't know if you were okay… I realized something about myself. About how I feel when it comes to you.",game:true,choices:[{label:"Tell me…",next:"realization"},{label:"I think I already know",next:"confession"}]},meansalot:{emoji:"✨",message:"You mean a lot to me too. More than I've been able to say out loud. This accident, as terrible as it was, made one thing very clear to me.",game:true,choices:[{label:"What's that?",next:"realization"}]},realization:{emoji:"🌙",message:"I realized that I don't just care about you as a friend. The thought of losing you, even for a second… it scared me more than anything. Because somewhere along the way, you became my person.",choices:[{label:"Continue… ❤️",next:"confession"}]},confession:{emoji:"🌷",message:"I really like you. Not in a rush, not with any pressure. I just… like you. The way you laugh, the way you care, everything. And right now, all I want is for you to heal, to rest, and to know that someone out here truly cares about you.",choices:[{label:"Read the last message 💕",next:"ending"}]},ending:{emoji:"🌸",message:"Let's not rush anything. Let's just take things slowly. You focus on getting better — I'll be right here. No pressure, no expectations. Just me, caring about you, one day at a time. Get well soon ❤️",final:true}};

const totalSteps=Object.keys(steps).length;
let visited=0;
const app=document.getElementById("app");

// ---- FLOATING HEARTS ----
const heartEmojis=["💕","💗","🌸","✨","💛","🩷"];
setInterval(()=>{const h=document.createElement("span");h.className="heart";h.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];h.style.left=Math.random()*100+"%";h.style.animationDuration=(6+Math.random()*6)+"s";document.body.appendChild(h);setTimeout(()=>h.remove(),12000)},2500);


function fadeInAudio(audio) {
  audio.volume = 0;
  audio.play();
  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 0.3) {
      vol += 0.02;
      audio.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}
  
let musicPlaying = false;
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

// 🎻 soft romantic volume
audio.volume = 0.3;

btn.onclick = function () {
  if (musicPlaying) {
    audio.pause();
    btn.textContent = "🔇";
  } else {
    fadeInAudio(audio);
    btn.textContent = "🎵";
  }
  musicPlaying = !musicPlaying;
};
  

// ---- HOLD BUTTON GAME ----
function createGame(container){
  const gc=document.createElement("div");
  gc.className="game-card";
  gc.innerHTML=`<div class="game-title">🎮 A Little Game</div><p class="game-sub">Hold the button… </p><div class="ring-wrap"><svg viewBox="0 0 100 100"><circle class="ring-bg" cx="50" cy="50" r="45"/><circle class="ring-fill" id="ringFill" cx="50" cy="50" r="45"/></svg><button class="hold-btn" id="holdBtn">0%</button></div><div id="gameReveal"></div>`;
  container.appendChild(gc);

  const holdBtn=document.getElementById("holdBtn");
  const ringFill=document.getElementById("ringFill");
  const reveal=document.getElementById("gameReveal");
  let progress=0,startTime=0,raf=null,revealed=false;
  const HOLD_MS=3000;

  function tick(){
    const elapsed=performance.now()-startTime;
    progress=Math.min(elapsed/HOLD_MS*100,100);
    ringFill.style.strokeDashoffset=283-283*progress/100;
    holdBtn.textContent=Math.round(progress)+"%";
    if(progress>=100){
      revealed=true;
      holdBtn.textContent="💕";
      reveal.className="reveal";
      reveal.style.opacity="1";
      reveal.innerHTML=`<p>Just like this… I wish I could hold your hand a little longer, a little tighter… until all your pain fades away 🤍</p><button onclick="this.parentElement.parentElement.querySelector('.ring-fill').style.strokeDashoffset=283;this.parentElement.parentElement.querySelector('.hold-btn').textContent='0%';this.parentElement.innerHTML=''">Hold again ✨</button>`;
      // reset closure
      revealed=false;progress=0;
      return;
    }
    raf=requestAnimationFrame(tick);
  }
  function startHold(e){
    e.preventDefault();
    if(reveal.innerHTML)return;
    startTime=performance.now()-progress/100*HOLD_MS;
    raf=requestAnimationFrame(tick);
  }
  function stopHold(){if(raf)cancelAnimationFrame(raf)}
  holdBtn.addEventListener("mousedown",startHold);
  holdBtn.addEventListener("mouseup",stopHold);
  holdBtn.addEventListener("mouseleave",stopHold);
  holdBtn.addEventListener("touchstart",startHold,{passive:false});
  holdBtn.addEventListener("touchend",stopHold);
}

// ---- RENDER ----
function render(id){
  visited++;
  const s=steps[id];
  const pct=Math.min(visited/totalSteps*100,100);
  app.innerHTML="";

  // Message card
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  if(s.emoji)card.innerHTML+=`<div class="emoji">${s.emoji}</div>`;
  card.innerHTML+=`<div class="message" id="msg"></div>`;
  app.appendChild(card);

  // Typing
  const msgEl=document.getElementById("msg");
  let i=0;
  const type=()=>{
    if(i<s.message.length){
      msgEl.textContent=s.message.slice(0,++i);
      msgEl.innerHTML+=`<span class="cursor"></span>`;
      setTimeout(type,30);
    }else{
      msgEl.textContent=s.message;
      // Show game if flagged
      if(s.game){
        createGame(app);
      }
      showChoices(s);
    }
  };
  type();
}

function showChoices(s){
  if(s.final){
    const d=document.createElement("div");
    d.className="card";
    d.style.cssText="animation-delay:.3s";
    d.innerHTML=`<div style="font-size:1.8rem">❤️</div><p class="final-note">— someone who truly cares</p>`;
    app.appendChild(d);
    return;
  }
  if(!s.choices)return;
  const wrap=document.createElement("div");
  wrap.className=s.game?"card":"";
  const inner=document.createElement("div");
  inner.className="choices";
  s.choices.forEach(c=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=c.label;
    b.onclick=()=>render(c.next);
    inner.appendChild(b);
  });
  wrap.appendChild(inner);
  app.appendChild(wrap);
}

render("start");
</script>
</body>
</html>
