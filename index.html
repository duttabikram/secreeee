<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,#fdf2f5,#fef3ed,#fdf0f3);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow-x:hidden;color:#4a2030;padding:16px}
#app{position:relative;z-index:10;width:100%;max-width:440px}
.card{background:rgba(255,255,255,0.85);backdrop-filter:blur(10px);border-radius:20px;padding:36px 28px;box-shadow:0 8px 32px rgba(180,100,130,0.12);border:1px solid #f3d5de;text-align:center;margin-bottom:20px}
.emoji{font-size:2.5rem;margin-bottom:14px}
.message{font-size:1.1rem;line-height:1.7;font-weight:500}
.btn{background:#d4748a;color:#fff;border:none;border-radius:14px;padding:14px 20px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:12px}
.music-btn{position:fixed;top:16px;right:16px;width:48px;height:48px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer}
</style>
</head>

<body>

<!-- 🎵 MUSIC BUTTON -->
<button class="music-btn" id="musicBtn">🔇</button>

<!-- 🎵 AUDIO FILE -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="app"></div>

<script>

// ---- STORY ----
const steps = {
  start:{
    emoji:"🌸",
    message:"Hey… I heard about the accident. Are you okay?",
    choices:[
      {label:"Still hurting 😔",next:"hurt"},
      {label:"I'm okay 😊",next:"ok"}
    ]
  },

  hurt:{
    emoji:"🤕",
    message:"I really wish I could be there to take care of you right now…",
    choices:[
      {label:"That means a lot 🥺",next:"love"}
    ]
  },

  ok:{
    emoji:"💛",
    message:"You always say you're fine… but I still worry about you.",
    choices:[
      {label:"You care a lot 😅",next:"love"}
    ]
  },

  love:{
    emoji:"🌷",
    message:"I do… more than I say. You mean a lot to me ❤️",
    final:true
  }
};

const app=document.getElementById("app");

function render(id){
  const s=steps[id];
  app.innerHTML="";

  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <div class="emoji">${s.emoji}</div>
    <div class="message">${s.message}</div>
  `;
  app.appendChild(card);

  if(s.final){
    return;
  }

  const wrap=document.createElement("div");
  s.choices.forEach(c=>{
    const b=document.createElement("button");
    b.className="btn";
    b.textContent=c.label;
    b.onclick=()=>render(c.next);
    wrap.appendChild(b);
  });

  app.appendChild(wrap);
}

render("start");

// ---- 🎵 MUSIC SYSTEM ----
let musicPlaying = false;
const audio = document.getElementById("bgMusic");
const btn = document.getElementById("musicBtn");

// soft volume (romantic feel)
audio.volume = 0.4;

btn.onclick = function () {
  if (musicPlaying) {
    audio.pause();
    btn.textContent = "🔇";
  } else {
    audio.play();
    btn.textContent = "🎵";
  }
  musicPlaying = !musicPlaying;
};

</script>

</body>
</html>
